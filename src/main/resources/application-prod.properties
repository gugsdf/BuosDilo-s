# ===========================
# CONFIGURACAO DO BANCO DE DADOS - PRODUCAO
# ===========================
## Prefer JDBC_URL (with jdbc: prefix). If not provided, falls back to DATABASE_URL.
# On Render/Aiven the URL may start with "postgresql://" - Spring/Hikari requires the JDBC prefix.
# You can either set JDBC_DATABASE_URL to a value starting with "jdbc:postgresql://..."
# or set DATABASE_URL to start with "jdbc:postgresql://...".
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL}}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
## HikariCP connection pool sizing (avoid exhausting DB connection slots on managed DBs)
# Keep this small when using managed DB plans with low max_connections (Aiven/Render etc.)
# Adjust `maximum-pool-size` <= (database max_connections - other consumers). Typical safe values: 2..10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
# ===========================
# JPA / HIBERNATE
# ===========================
## Em produção aqui preferimos NÃO alterar o esquema automaticamente se você não
## quer que a aplicação aplique migrations automaticamente. Mantemos 'none' para
## evitar mudanças no banco (você pode usar ferramentas de migração como Flyway).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ===========================
# SERVIDOR
# ===========================
server.port=${PORT:8080}
# ===========================
# LOGS
# ===========================
logging.level.com.ecommerce=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
